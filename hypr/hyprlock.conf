background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
}

shape {
    monitor =
    size = 360, 70
    color = rgba(24, 24, 37, 0.8)
    rounding = 15
    border_size = 2
    border_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    position = 0, -120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 70
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = rgba(0, 0, 0, 0.0)
    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    rounding = 15
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    placeholder_text = <i>Password</i>
    fail_text = <i>$FAIL</i>
    check_color = rgb(49, 100, 50)
    fail_color = rgb(100, 40, 40)
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%H:%M"
    font_size = 90
    color = rgb(205, 214, 244)
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 20
    color = rgb(205, 214, 244)
    position = 0, -10
    halign = center
    valign = center
}
